spring:
  application:
    name: springai-deepseek-chat-redis
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 12
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: -1ms
  
  # AI配置 (DeepSeek兼容OpenAI API)
  ai:
    openai:
      api-key: sk-6f64a2d36aca478f9b2c9c3af6f9df1c
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: deepseek-v3.1
          temperature: 0.7
          max-tokens: 2000

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    io.binghe.ai.chat: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

ai:
  chat:
    expire-seconds: 3600
    max-message-size: 20