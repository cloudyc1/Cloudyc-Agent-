spring:
  application:
    name: langchain4j-deepseek-chat-redis

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 12
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: -1ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

langchain4j:
  open-ai:
    chat-model:
      api-key:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: deepseek-v3.1
      temperature: 0.7
      max-tokens: 2000
      log-requests: true
      log-responses: false

    embedding-model:
      api-key:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v3
      dimensions: 1536

rag:
  enabled: true
  retrieval:
    top-k: 5
    similarity-threshold: 0.3
    max-chunk-size: 500
    chunk-overlap: 50

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    io.binghe.ai.chat: DEBUG
    dev.langchain4j: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

ai:
  chat:
    expire-seconds: 2592000
    max-message-size: 20
    session-expire-days: 30
