<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能对话系统 | LangChain4j + DeepSeek</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
<!-- 主应用容器 -->
<div class="app-layout">
    <!-- 左侧边栏 - 历史对话 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 对话列表</h2>
            <button class="new-chat-btn" onclick="startNewChat()" title="开始新对话">
                <span>+</span> 新对话
            </button>
        </div>
        <div class="sidebar-user">
            <input type="text" class="user-id-input" id="userId" placeholder="请输入用户标识符" value="cloudyc">
        </div>
        <div class="session-list" id="sessionList">
            <div class="session-empty">暂无历史对话<br>发送消息后自动创建</div>
        </div>
        <div class="sidebar-footer">
            <button class="sidebar-action-btn" onclick="getHistory()">
                <span>📋</span> 查看当前对话
            </button>
            <button class="sidebar-action-btn" onclick="getStats()">
                <span>📊</span> 获取统计
            </button>
            <button class="sidebar-action-btn danger" onclick="clearHistory()">
                <span>🗑️</span> 清除当前对话
            </button>
        </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="main-area">
        <!-- 知识库管理面板 -->
        <div class="knowledge-panel" id="knowledgePanel">
            <div class="panel-header">
                <h3>📚 知识库管理</h3>
                <button class="close-panel" onclick="toggleKnowledgePanel()">✕</button>
            </div>
            <div class="panel-content">
                <div class="upload-area">
                    <input type="file" id="fileInput" accept=".txt,.md,.pdf,.doc,.docx" style="display: none;">
                    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                        <span>📁</span> 上传文档
                    </button>
                    <button class="add-text-btn" onclick="showAddTextDialog()">
                        <span>✏️</span> 添加文本
                    </button>
                </div>
                <div class="knowledge-stats" id="knowledgeStats">
                    <div class="stat-item">
                        <span class="stat-label">文档数</span>
                        <span class="stat-value" id="docCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">分段数</span>
                        <span class="stat-value" id="segmentCount">0</span>
                    </div>
                </div>
                <div class="document-list" id="documentList">
                    <div class="empty-state">暂无文档</div>
                </div>
                <button class="clear-btn" onclick="clearKnowledge()">
                    <span>🗑️</span> 清空知识库
                </button>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container">
            <div class="chat-header">
                <h2>
                    <span>🤖</span> 智能对话助手
                    <span id="currentSessionTitle" class="session-title"></span>
                </h2>
                <div class="chat-header-controls">
                    <button class="knowledge-toggle-btn" onclick="toggleKnowledgePanel()" title="知识库管理">
                        <span>📚</span>
                    </button>
                    <button class="mode-toggle-btn" id="modeToggleBtn" onclick="toggleMode()">
                        <span class="mode-icon">🔄</span>
                        <span class="mode-text" id="modeText">模式: Normal</span>
                    </button>
                    <div class="chat-header-status">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="apiStatusText">就绪</span>
                    </div>
                </div>
            </div>

            <div class="messages-container" id="chatMessages">
                <div class="message message-ai">
                    <div class="message-avatar ai-avatar">🤖</div>
                    <div class="message-content">
                        您好！我是基于 DeepSeek 大语言模型的智能助手，由 LangChain4j 框架驱动。<br><br>
                        请开始我们的对话吧！
                        <div class="message-time">系统消息 • 刚刚</div>
                    </div>
                </div>
            </div>

            <div class="input-container">
            <div class="input-wrapper">
                <textarea class="message-input" id="messageInput" placeholder="输入您的问题或消息...（按 Enter 发送）" rows="1"></textarea>
                <button class="send-button" onclick="sendMessage()" id="sendButton">
                    <span>发送</span>
                    <span>↗</span>
                </button>
            </div>
        </div>
        </div>
    </div>
</div>
<script src="js/index.js"></script>
</body>
</html>
